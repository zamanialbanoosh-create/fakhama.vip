<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>فحص كود الجائزة</title><style>body{margin:0;font-family:Tahoma,Arial;background:#111;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}.card{width:100%;max-width:440px;background:#1b1b1b;border:1px solid #d4af37;border-radius:24px;padding:25px;box-shadow:0 15px 40px rgba(0,0,0,.35)}h2{color:#ffd700;margin-top:0}.ok{color:#22c55e;font-size:28px;font-weight:bold}.bad{color:#ef4444;font-size:28px;font-weight:bold}.warn{color:#f59e0b;font-size:26px;font-weight:bold}.code{font-size:30px;color:#ffd700;font-weight:bold;direction:ltr}.box{background:#000;border:1px dashed #d4af37;border-radius:16px;padding:15px;margin-top:15px;line-height:2}input,button{width:100%;padding:14px;margin-top:10px;border-radius:12px;font-size:18px;border:0}button{background:#ffd700;color:#111;font-weight:bold}</style></head><body><div class="card"><h2>فحص كود الجائزة</h2><input id="manual" placeholder="TAJ-123456"><button onclick="checkCode(manual.value)">فحص الكود</button><div id="result" style="margin-top:15px">جاري الفحص...</div></div><script>async function checkCode(code){code=String(code||"").trim().toUpperCase();if(!code){result.innerHTML='<div class="bad">❌ لا يوجد كود</div>';return}result.innerHTML="جاري الفحص...";const res=await fetch("/api/check/"+encodeURIComponent(code));const json=await res.json();if(!json.valid){const cls=json.status==="expired"?"warn":"bad";result.innerHTML='<div class="'+cls+'">❌ '+(json.message||"الكود غير صالح")+'</div>';if(json.claim){result.innerHTML+='<div class="box"><div class="code">'+json.claim.claimCode+'</div><div>الجائزة: <b>'+json.claim.prizeTitle+'</b></div><div>الحالة: '+json.claim.status+'</div></div>'}return}const c=json.claim;result.innerHTML='<div class="ok">✅ الكود صحيح</div><div class="box"><div>كود الجائزة</div><div class="code">'+c.claimCode+'</div><div>رقم العميل: '+c.phone+'</div><div>الجائزة: <b>'+c.prizeTitle+'</b></div><div>الصلاحية إلى:<br>'+new Date(c.expiresAt).toLocaleString()+'</div></div>'}const q=new URLSearchParams(location.search).get("code");if(q){manual.value=q;checkCode(q)}else result.innerHTML="أدخل الكود أو امسح QR";</script></body></html>
