<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>اسكن جائزة العميل</title><script src="https://unpkg.com/html5-qrcode"></script><style>body{margin:0;font-family:Tahoma;background:#111;color:white;padding:20px;text-align:center}.card{max-width:470px;margin:auto;background:#1b1b1b;border:1px solid #d4af37;border-radius:24px;padding:20px}h2{color:#ffd700}#reader{width:100%;margin-top:15px}.ok{color:#22c55e;font-size:26px;font-weight:bold}.bad{color:#ef4444;font-size:26px;font-weight:bold}.box{background:#000;border:1px dashed #d4af37;border-radius:16px;padding:15px;margin-top:15px;line-height:2}.code{font-size:28px;color:#ffd700;font-weight:bold;direction:ltr}input,button{width:100%;padding:14px;margin-top:10px;border-radius:12px;font-size:18px;box-sizing:border-box}button{background:#ffd700;color:#111;border:0;font-weight:bold}.green{background:#22c55e;color:#fff}</style></head><body><div class="card"><h2>فحص كود الجائزة</h2><input id="manualCode" placeholder="TAJ-123456"><button onclick="manualCheck()">فحص يدوي</button><div id="reader"></div><div id="result">افتح الكاميرا وامسح QR</div><div id="redeemBox" style="display:none"><input id="pin" placeholder="رمز الموظف" type="password"><input id="orderNo" placeholder="رقم الفاتورة / اختياري"><button class="green" onclick="redeem()">تفعيل الجائزة</button></div></div><script>let currentCode="";function extractCode(text){try{const u=new URL(text);return u.searchParams.get("code")||text}catch(e){return text}}async function checkCode(code){code=String(code||"").trim().toUpperCase();currentCode=code;if(!code){result.innerHTML='<div class="bad">❌ لا يوجد كود</div>';return}result.innerHTML="جاري الفحص...";const res=await fetch("/api/check/"+encodeURIComponent(code));const json=await res.json();if(!json.valid){redeemBox.style.display="none";result.innerHTML='<div class="bad">❌ '+(json.message||"الكود غير صالح")+'</div>';return}const c=json.claim;redeemBox.style.display="block";result.innerHTML='<div class="ok">✅ الكود صحيح</div><div class="box"><div>كود الجائزة</div><div class="code">'+c.claimCode+'</div><div>رقم العميل: '+c.phone+'</div><div>الجائزة: <b>'+c.prizeTitle+'</b></div><div>الصلاحية:<br>'+new Date(c.expiresAt).toLocaleString()+'</div></div>'}function manualCheck(){checkCode(manualCode.value)}async function redeem(){const res=await fetch("/api/redeem",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({code:currentCode,pin:pin.value,orderNo:orderNo.value,usedBy:"staff"})});const j=await res.json();if(j.success){result.innerHTML='<div class="ok">✅ تم تفعيل الجائزة</div>';redeemBox.style.display="none"}else{alert(j.message||"خطأ")}}const scanner=new Html5Qrcode("reader");scanner.start({facingMode:"environment"},{fps:10,qrbox:250},txt=>{const c=extractCode(txt);scanner.stop();manualCode.value=c;checkCode(c)},()=>{}).catch(()=>{result.innerHTML="إذا لم تعمل الكاميرا استخدم الفحص اليدوي"});</script></body></html>
