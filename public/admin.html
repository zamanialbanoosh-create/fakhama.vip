<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة</title>

<style>

body{
    margin:0;
    background:#111;
    font-family:tahoma;
    color:#fff;
    padding:20px;
}

.card{
    max-width:1000px;
    margin:auto;
    background:#1b1b1b;
    border:1px solid #333;
    border-radius:24px;
    padding:25px;
}

h1{
    color:#ffd700;
    margin-bottom:25px;
}

input,textarea{
    width:100%;
    background:#000;
    border:1px solid #444;
    border-radius:14px;
    padding:14px;
    color:#fff;
    font-size:16px;
    box-sizing:border-box;
}

textarea{
    min-height:100px;
}

label{
    color:#ffd700;
    display:block;
    margin-bottom:8px;
    margin-top:20px;
}

button{
    background:#ffd700;
    color:#000;
    border:none;
    padding:14px 24px;
    border-radius:14px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:15px;
}

.hidden{
    display:none;
}

.prize{
    background:#000;
    border:1px solid #333;
    border-radius:14px;
    padding:15px;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h1>إدارة نظام الجوائز</h1>

<div id="loginBox">

<label>PIN الإدارة</label>
<input type="password" id="adminPin" placeholder="••••••">

<br><br>

<button onclick="login()">دخول</button>

</div>

<div id="adminPanel" class="hidden">

<h1>إعدادات المحل</h1>

<div class="row">

<div>
<label>اسم المحل</label>
<input id="shopName" value="TAJ AL FAKHAMA">
</div>

<div>
<label>واتساب المحل</label>
<input id="shopWhatsapp" value="965XXXXXXXX">
</div>

<div>
<label>مدة صلاحية الجائزة (بالساعات)</label>
<input id="expireHours" value="24">
</div>

</div>

<label>رسالة أسفل الجائزة</label>
<textarea id="footerMessage">الجائزة لا تعتمد إلا بعد فحص الكود من الموظف.</textarea>

<br><br>

<button onclick="saveSettings()">حفظ الإعدادات</button>

<hr style="margin:40px 0;border-color:#333;">

<h1>الجوائز</h1>

<div id="prizesList"></div>

</div>

</div>

<script>

async function login(){

    const pin=document.getElementById("adminPin").value;

    try{

        const res=await fetch("/api/admin/login",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({pin})
        });

        const data=await res.json();

        if(data.success){

            localStorage.setItem("admin_token","ok");

            document.getElementById("loginBox").style.display="none";

            document.getElementById("adminPanel").classList.remove("hidden");

            loadPrizes();

        }else{

            alert("الرقم السري غير صحيح");

        }

    }catch(err){

        alert("خطأ في الاتصال بالسيرفر");

    }

}

async function loadPrizes(){

    try{

        const res=await fetch("/api/prizes");

        const data=await res.json();

        const box=document.getElementById("prizesList");

        box.innerHTML="";

        data.data.forEach(p=>{

            box.innerHTML+=`
            <div class="prize">
                <div><b>الجائزة:</b> ${p.title}</div>
                <div><b>الكود:</b> ${p.code}</div>
                <div><b>الوزن:</b> ${p.weight}</div>
            </div>
            `;

        });

    }catch(err){

        console.log(err);

    }

}

function saveSettings(){

    alert("تم حفظ الإعدادات");

}

</script>

</body>
</html>
